services:
  slack-mcp:
    image: ghcr.io/korotovsky/slack-mcp-server:v1.1.28
    command: ["mcp-server", "--transport", "sse"]
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      SLACK_MCP_HOST: "0.0.0.0"
      SLACK_MCP_PORT: "3001"
    env_file: .env
    volumes:
      - ./data/slack:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --max-time 2 http://localhost:3001/sse || test $$? -eq 28"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  grafana-mcp:
    image: grafana/mcp-grafana:0.11.0
    command: ["-t", "sse", "--disable-write"]
    ports:
      - "127.0.0.1:3002:8000"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
